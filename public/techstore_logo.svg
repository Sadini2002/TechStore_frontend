<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon/Symbol -->
  <g transform="translate(10, 10)">
    <!-- Circuit pattern background -->
    <rect width="60" height="60" rx="12" fill="url(#gradient)"/>
    
    <!-- Circuit lines -->
    <g stroke="white" stroke-width="2" fill="none" opacity="0.8">
      <path d="M15 20 L25 20 L25 30 L35 30"/>
      <path d="M25 40 L35 40 L35 50 L45 50"/>
      <path d="M15 35 L20 35 L20 45"/>
    </g>
    
    <!-- Circuit nodes -->
    <g fill="white">
      <circle cx="15" cy="20" r="3"/>
      <circle cx="25" cy="30" r="3"/>
      <circle cx="35" cy="40" r="3"/>
      <circle cx="45" cy="50" r="3"/>
      <circle cx="20" cy="45" r="2"/>
    </g>
    
    <!-- Shopping cart element -->
    <g transform="translate(35, 15)" stroke="white" stroke-width="2" fill="none">
      <path d="M0 5 L5 5 L7 15 L15 15"/>
      <circle cx="8" cy="20" r="2" fill="white"/>
      <circle cx="13" cy="20" r="2" fill="white"/>
    </g>
  </g>
  
  <!-- Text -->
  <g transform="translate(90, 25)">
    <!-- "Tech" in bold -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1f2937">
      Tech
    </text>
    
    <!-- "Store" in regular weight -->
    <text x="85" y="25" font-family="Arial, sans-serif" font-size="32" font-weight="normal" fill="#3b82f6">
      Store
    </text>
    
    <!-- Tagline -->
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
      Your Tech, Our Passion
    </text>
  </g>
</svg>